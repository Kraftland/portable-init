name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Update repos
      run: sudo apt-get update && sudo apt-get upgrade

    - name: Install dependencies
      run: sudo apt-get install seccomp libseccomp-dev librust-libseccomp-sys-dev -y
    
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
