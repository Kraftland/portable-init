name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
    - uses: actions/checkout@v6

    - name: Update repos
      run: pacman -Syu --needed --noconfirm libseccomp rust

    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
